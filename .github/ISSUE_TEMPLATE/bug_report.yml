name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include steps to reproduce so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: e.g. Generate Post shows "Usage limit check failed"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps help a lot.
      placeholder: |
        1. Sign in
        2. Go to /dashboard
        3. Click Generate Post
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. Chrome on Android, production URL, or local dev
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / logs
      description: Optional. Redact any API keys or personal data.
    validations:
      required: false
